<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makeover Beauty Shop - Online Retail</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }

    /* Footer Custom Styles */
    footer {
      background-color: #161414;
      color: #E91E63;
      padding: 30px 0;
      text-align: center;
    }

    footer p {
      margin: 0;
      font-size: 14px;
    }

    footer .social-links a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-size: 16px;
      transition: color 0.3s ease;
    }

    footer .social-links a:hover {
      color: #E91E63; /* Golden color on hover */
    }

    footer .social-links {
      margin: 15px 0;
    }

    footer .social-links a:first-child {
      margin-left: 0;
    }

    footer .social-links a:last-child {
      margin-right: 0;
    }

    footer .social-links a i {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">✨ Makeover Beauty</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="navContent" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="viewOrdersLink">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="viewCartLink">Cart (<span id="cartCount">0</span>)</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="bg-primary text-white py-5">
    <div class="container text-center">
      <h1 class="display-5 fw-bold">✨ Makeover Beauty Shop</h1>
      <p class="lead">Discover Your Perfect Look - Premium Beauty Products & Cosmetics</p>
    </div>
  </header>

  <!-- Products -->
  <section class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Products</h2>
    </div>
    
    <!-- Search and Filter Section -->
    <div class="row mb-4">
      <div class="col-md-6 mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-search"></i></span>
          <input type="text" class="form-control" id="searchInput" placeholder="Search products by name or description..." />
        </div>
      </div>
      <div class="col-md-6 mb-3">
        <select class="form-select" id="categoryFilter">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>
    
    <div id="productGrid" class="row g-4"></div>
  </section>

  <!-- Cart Modal -->
  <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Your Cart</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="cartItems"></div>
          <hr />
          <form id="checkoutForm" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="customerName" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="customerEmail" required />
            </div>
            <div class="col-12 d-flex justify-content-between align-items-center">
              <h5>Total: <span id="cartTotal">0</span> BDT</h5>
              <button type="submit" class="btn btn-success">Place Order</button>
            </div>
          </form>
          <div id="checkoutMsg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Orders Modal -->
  <div class="modal fade" id="ordersModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Recent Orders</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="ordersList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Makeover Beauty Shop. All rights reserved.</p>
    <p>Follow us on:</p>
    <div class="social-links">
      <a href="#" class="facebook"><i class="fab fa-facebook-f"></i>Facebook</a>
      <a href="#" class="instagram"><i class="fab fa-instagram"></i>Instagram</a>
      <a href="#" class="twitter"><i class="fab fa-twitter"></i>Twitter</a>
    </div>
  </footer>

  <!-- jQuery + Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Font Awesome for Social Icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js"></script>
  <!-- Socket.IO client -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- App JS -->
  <script src="/js/app.js"></script>
</body>
</html>
